<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>배지 아이콘 진화 시스템</title>
  <meta http-equiv="refresh" content="0; url=./badge-stage-system.html">
  <link rel="canonical" href="./badge-stage-system.html">
  <style>
    :root {
      color-scheme: light;
      font-family: "Pretendard Variable", Pretendard, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #fff8ef;
      color: #2d221d;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top left, rgba(255, 217, 101, 0.22), transparent 28%),
        radial-gradient(circle at bottom right, rgba(131, 214, 201, 0.18), transparent 26%),
        #fff8ef;
    }

    main {
      width: min(560px, calc(100vw - 32px));
      padding: 28px;
      border-radius: 28px;
      border: 1px solid rgba(88, 67, 59, 0.12);
      background: rgba(255, 255, 255, 0.92);
      box-shadow: 0 24px 48px rgba(73, 52, 42, 0.12);
      text-align: center;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(1.8rem, 4vw, 2.4rem);
      line-height: 1.08;
    }

    p {
      margin: 0;
      color: #6b5a53;
      line-height: 1.6;
    }

    a {
      color: #2c6f77;
      font-weight: 800;
    }
  </style>
</head>
<body>
  <main>
    <h1>배지 아이콘 진화 페이지로 이동합니다</h1>
    <p>
      자동으로 이동하지 않으면
      <a href="./badge-stage-system.html">여기를 눌러 배지 단계 시안 페이지</a>
      를 열어주세요.
    </p>
  </main>
</body>
</html>
