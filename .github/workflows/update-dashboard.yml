name: Update Swimming Dashboard Data

on:
  workflow_dispatch:
  schedule:
    # UTC 기준: 00:00, 06:00, 12:00, 18:00 (하루 4회)
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr tesseract-ocr-kor
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Crawl incremental and refresh JSON
        run: |
          python -m swimdash incremental --recent-pages 12 --lookback-days 3 --rate-limit 0.55 --timeout 20

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/*.json logs/*.log || true
          if git diff --cached --quiet; then
            echo "No data changes"
            exit 0
          fi
          git commit -m "chore(data): update swimming diary dashboard data"
          git push
